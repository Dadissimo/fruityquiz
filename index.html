<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruit Salad Personality Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(14px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes pop {
      0% { transform: scale(0.92); }
      60% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .float-in { animation: floatIn 420ms ease-out both; }
    .pop { animation: pop 420ms ease-out both; }

    .gradient-text {
      background: linear-gradient(135deg, #fb7185, #f59e0b, #84cc16, #22c55e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
  </style>
</head>
<body class="min-h-screen bg-orange-50 text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-5xl flex-col px-4 py-8 sm:px-6 lg:px-8">
    <section id="app" class="flex flex-1 items-center justify-center"></section>
  </main>

  <script>
    const FRUITS = [
      {
        id: 'strawberry',
        name: 'Strawberry',
        emoji: '🍓',
        vector: [0.9, 0.4, 0.9, 0.5], // [Social, Novelty, Emotion, Structure]
        color: 'from-red-400 to-pink-500',
        accent: '#fb7185',
        desc: 'You are the heart of the bowl. Your energy is warm and communal, thriving on deep emotional resonance and shared experiences.',
        strengths: ['High empathy', 'Relationship building', 'Inclusivity'],
        growth: ['Setting boundaries', 'Independent decision-making'],
        thrive: 'When everyone feels heard and connected.'
      },
      {
        id: 'blueberries',
        name: 'Blueberries',
        emoji: '🫐',
        vector: [0.2, 0.3, 0.2, 0.9],
        color: 'from-blue-500 to-indigo-600',
        accent: '#4f46e5',
        desc: 'The precision thinker. You find beauty in the details and peace in the quiet. Your intelligence is subtle but incredibly sharp.',
        strengths: ['Analytical depth', 'Reliability', 'Focus'],
        growth: ['Spontaneity', 'Verbalizing internal thoughts'],
        thrive: 'In organized environments where quality is valued over speed.'
      },
      {
        id: 'pineapple',
        name: 'Pineapple',
        emoji: '🍍',
        vector: [0.8, 0.9, 0.5, 0.3],
        color: 'from-yellow-300 to-amber-500',
        accent: '#f59e0b',
        desc: 'The bright catalyst. You bring surprise, boldness, and momentum. People feel your presence before you even enter the room.',
        strengths: ['Charisma', 'Creative risk-taking', 'Momentum'],
        growth: ['Patience', 'Following through after the spark'],
        thrive: 'When there is room to experiment, play, and make things memorable.'
      },
      {
        id: 'banana',
        name: 'Banana',
        emoji: '🍌',
        vector: [0.7, 0.2, 0.6, 0.8],
        color: 'from-yellow-200 to-yellow-500',
        accent: '#eab308',
        desc: 'The steady comfort. You are familiar in the best way: dependable, kind, and quietly essential to the whole mix.',
        strengths: ['Consistency', 'Supportiveness', 'Practical care'],
        growth: ['Trying unfamiliar things', 'Asking directly for what you need'],
        thrive: 'When routines are healthy and your loyalty is appreciated.'
      },
      {
        id: 'kiwi',
        name: 'Kiwi',
        emoji: '🥝',
        vector: [0.4, 0.9, 0.7, 0.2],
        color: 'from-lime-400 to-emerald-500',
        accent: '#22c55e',
        desc: 'The unexpected original. You seem calm at first, but inside you are vivid, curious, strange, and full of texture.',
        strengths: ['Originality', 'Curiosity', 'Emotional honesty'],
        growth: ['Grounding ideas', 'Letting people catch up with you'],
        thrive: 'When weirdness is welcomed and exploration has no strict script.'
      },
      {
        id: 'orange',
        name: 'Orange',
        emoji: '🍊',
        vector: [0.9, 0.7, 0.6, 0.4],
        color: 'from-orange-400 to-red-500',
        accent: '#f97316',
        desc: 'The social spark. You are open, expressive, and energizing. You help people loosen up and remember that life can be juicy.',
        strengths: ['Optimism', 'Communication', 'Group energy'],
        growth: ['Listening before reacting', 'Resting without guilt'],
        thrive: 'In lively spaces with people, music, humor, and movement.'
      },
      {
        id: 'watermelon',
        name: 'Watermelon',
        emoji: '🍉',
        vector: [0.8, 0.5, 0.8, 0.6],
        color: 'from-rose-400 to-green-500',
        accent: '#f43f5e',
        desc: 'The generous host. You carry abundance, ease, and a sense of celebration. You make people feel invited into something bigger.',
        strengths: ['Hospitality', 'Emotional generosity', 'Creating atmosphere'],
        growth: ['Not overextending', 'Letting others contribute'],
        thrive: 'When joy, comfort, and togetherness can coexist.'
      },
      {
        id: 'grapes',
        name: 'Grapes',
        emoji: '🍇',
        vector: [0.6, 0.4, 0.4, 0.7],
        color: 'from-purple-400 to-violet-700',
        accent: '#7c3aed',
        desc: 'The connector of clusters. You understand networks, timing, and subtle social dynamics. You are adaptable without losing yourself.',
        strengths: ['Diplomacy', 'Pattern recognition', 'Adaptability'],
        growth: ['Choosing clearly', 'Avoiding people-pleasing'],
        thrive: 'In communities where you can move between groups and create bridges.'
      },
      {
        id: 'mango',
        name: 'Mango',
        emoji: '🥭',
        vector: [0.7, 0.8, 0.8, 0.3],
        color: 'from-amber-300 to-orange-600',
        accent: '#fb923c',
        desc: 'The lush dreamer. You are expressive, sensual, imaginative, and drawn to moments that feel rich with possibility.',
        strengths: ['Imagination', 'Warmth', 'Expressiveness'],
        growth: ['Simplifying choices', 'Turning dreams into steps'],
        thrive: 'When beauty, freedom, and emotional depth are all present.'
      },
      {
        id: 'apple',
        name: 'Apple',
        emoji: '🍎',
        vector: [0.5, 0.3, 0.5, 0.9],
        color: 'from-red-500 to-emerald-500',
        accent: '#ef4444',
        desc: 'The grounded classic. You value clarity, health, and integrity. You are straightforward, capable, and quietly principled.',
        strengths: ['Discipline', 'Common sense', 'Integrity'],
        growth: ['Flexibility', 'Allowing messy feelings'],
        thrive: 'When expectations are clear and effort leads to real results.'
      }
    ];

    const QUESTIONS = [
      {
        text: 'At a party, where do you naturally end up?',
        options: [
          { text: 'Checking in with people and making sure everyone feels included.', vector: [1, 0.2, 0.9, 0.4] },
          { text: 'Having one deep conversation in a quieter corner.', vector: [0.3, 0.3, 0.8, 0.7] },
          { text: 'Starting something funny, weird, or memorable.', vector: [0.9, 1, 0.5, 0.2] },
          { text: 'Helping with the setup, drinks, food, or music flow.', vector: [0.6, 0.2, 0.5, 1] }
        ]
      },
      {
        text: 'What kind of compliment actually lands for you?',
        options: [
          { text: '“You made me feel safe and understood.”', vector: [0.8, 0.2, 1, 0.5] },
          { text: '“You noticed something nobody else did.”', vector: [0.2, 0.4, 0.3, 1] },
          { text: '“You are completely original.”', vector: [0.4, 1, 0.7, 0.2] },
          { text: '“You bring people together.”', vector: [1, 0.5, 0.6, 0.5] }
        ]
      },
      {
        text: 'Your ideal weekend has more of this:',
        options: [
          { text: 'Friends, food, warmth, and shared memories.', vector: [1, 0.4, 0.8, 0.4] },
          { text: 'A clean plan, good sleep, and a few meaningful tasks completed.', vector: [0.2, 0.2, 0.3, 1] },
          { text: 'A spontaneous trip, strange idea, or new experience.', vector: [0.6, 1, 0.6, 0.1] },
          { text: 'Music, color, movement, and a little bit of chaos.', vector: [0.9, 0.8, 0.7, 0.2] }
        ]
      },
      {
        text: 'When plans change suddenly, you tend to:',
        options: [
          { text: 'Adapt quickly and look for the fun angle.', vector: [0.8, 0.9, 0.5, 0.2] },
          { text: 'Need a moment to recalibrate before moving forward.', vector: [0.3, 0.3, 0.5, 0.8] },
          { text: 'Check how everyone else is feeling about it.', vector: [0.9, 0.4, 0.9, 0.4] },
          { text: 'Create a new practical structure so things still work.', vector: [0.4, 0.2, 0.4, 1] }
        ]
      },
      {
        text: 'Pick the sentence that feels most like you.',
        options: [
          { text: '“The vibe matters.”', vector: [0.8, 0.7, 0.8, 0.2] },
          { text: '“Let’s make this actually work.”', vector: [0.4, 0.2, 0.4, 1] },
          { text: '“I wonder what happens if we try this differently.”', vector: [0.4, 1, 0.5, 0.3] },
          { text: '“I want everyone to feel part of it.”', vector: [1, 0.3, 0.9, 0.5] }
        ]
      },
      {
        text: 'What drains you fastest?',
        options: [
          { text: 'Cold, disconnected group dynamics.', vector: [0.9, 0.2, 1, 0.4] },
          { text: 'Messy processes with no clear logic.', vector: [0.2, 0.2, 0.2, 1] },
          { text: 'Doing the same thing the same way forever.', vector: [0.5, 1, 0.5, 0.1] },
          { text: 'Being expected to be “on” all the time.', vector: [0.2, 0.3, 0.6, 0.8] }
        ]
      },
      {
        text: 'In a creative project, you usually bring:',
        options: [
          { text: 'The emotional core.', vector: [0.7, 0.4, 1, 0.4] },
          { text: 'The structure and quality control.', vector: [0.2, 0.2, 0.3, 1] },
          { text: 'The strange idea that makes it special.', vector: [0.4, 1, 0.6, 0.2] },
          { text: 'The energy that gets people moving.', vector: [1, 0.7, 0.5, 0.3] }
        ]
      },
      {
        text: 'Choose your fruit salad superpower:',
        options: [
          { text: 'Making people open up.', vector: [0.8, 0.2, 1, 0.5] },
          { text: 'Spotting what is missing.', vector: [0.2, 0.4, 0.3, 1] },
          { text: 'Turning ordinary moments into stories.', vector: [0.8, 0.9, 0.7, 0.2] },
          { text: 'Creating a stable base for everyone else.', vector: [0.5, 0.2, 0.5, 1] }
        ]
      }
    ];

    let state = {
      screen: 'start',
      current: 0,
      answers: []
    };

    const app = document.getElementById('app');

    function averageVector(vectors) {
      const sum = [0, 0, 0, 0];
      vectors.forEach(vector => vector.forEach((value, index) => sum[index] += value));
      return sum.map(value => value / vectors.length);
    }

    function distance(a, b) {
      return Math.sqrt(a.reduce((sum, value, index) => sum + Math.pow(value - b[index], 2), 0));
    }

    function getResult() {
      const userVector = averageVector(state.answers.map(answer => answer.vector));
      const ranked = FRUITS
        .map(fruit => ({ ...fruit, score: distance(userVector, fruit.vector) }))
        .sort((a, b) => a.score - b.score);

      return {
        winner: ranked[0],
        runnerUps: ranked.slice(1, 4),
        userVector
      };
    }

    function pct(value) {
      return Math.round(value * 100);
    }

    function restart() {
      state = { screen: 'start', current: 0, answers: [] };
      render();
    }

    function startQuiz() {
      state.screen = 'quiz';
      render();
    }

    function chooseOption(option) {
      state.answers[state.current] = option;

      if (state.current < QUESTIONS.length - 1) {
        state.current += 1;
        render();
      } else {
        state.screen = 'result';
        render();
      }
    }

    function goBack() {
      if (state.current > 0) {
        state.current -= 1;
        render();
      } else {
        state.screen = 'start';
        render();
      }
    }

    function shareResult() {
      const result = getResult().winner;
      const text = `I am ${result.emoji} ${result.name} in the Fruit Salad Personality Test.`;

      if (navigator.share) {
        navigator.share({ title: 'Fruit Salad Personality Test', text }).catch(() => {});
      } else {
        navigator.clipboard.writeText(text);
        const button = document.getElementById('shareButton');
        button.textContent = 'Copied result';
        setTimeout(() => button.textContent = 'Copy result', 1400);
      }
    }

    function card(content) {
      return `
        <div class="float-in w-full rounded-[2rem] border border-white/70 bg-white/80 p-6 shadow-xl shadow-orange-200/50 backdrop-blur sm:p-8">
          ${content}
        </div>
      `;
    }

    function renderStart() {
      app.innerHTML = card(`
        <div class="mx-auto max-w-3xl text-center">
          <div class="mb-4 text-6xl pop">🍓🍊🥝</div>
          <p class="mb-3 text-sm font-semibold uppercase tracking-[0.28em] text-orange-500">Fruit Salad Personality Test</p>
          <h1 class="mb-5 text-4xl font-black leading-tight gradient-text sm:text-6xl">Which fruit are you in the bowl?</h1>
          <p class="mx-auto mb-8 max-w-2xl text-lg leading-8 text-slate-600">
            Answer eight quick questions and discover your fruit archetype based on four traits: social energy, novelty, emotional depth, and structure.
          </p>
          <button onclick="startQuiz()" class="rounded-full bg-slate-900 px-8 py-4 text-base font-bold text-white shadow-lg shadow-slate-300 transition hover:-translate-y-0.5 hover:bg-slate-800">
            Start the test
          </button>
          <div class="mt-8 grid gap-3 text-left sm:grid-cols-4">
            ${['Social', 'Novelty', 'Emotion', 'Structure'].map(label => `
              <div class="rounded-2xl bg-orange-100/70 p-4 text-center text-sm font-semibold text-slate-700">${label}</div>
            `).join('')}
          </div>
        </div>
      `);
    }

    function renderQuiz() {
      const question = QUESTIONS[state.current];
      const progress = ((state.current + 1) / QUESTIONS.length) * 100;

      app.innerHTML = card(`
        <div class="mb-8 flex items-center justify-between gap-4">
          <button onclick="goBack()" class="rounded-full bg-orange-100 px-4 py-2 text-sm font-bold text-slate-700 transition hover:bg-orange-200">Back</button>
          <div class="text-sm font-bold text-orange-500">${state.current + 1} / ${QUESTIONS.length}</div>
        </div>

        <div class="mb-8 h-3 overflow-hidden rounded-full bg-orange-100">
          <div class="h-full rounded-full bg-gradient-to-r from-orange-400 to-pink-500 transition-all duration-500" style="width: ${progress}%"></div>
        </div>

        <div class="mx-auto max-w-3xl">
          <h2 class="mb-8 text-3xl font-black leading-tight text-slate-900 sm:text-4xl">${question.text}</h2>
          <div class="grid gap-4">
            ${question.options.map((option, index) => `
              <button onclick="chooseOption(QUESTIONS[${state.current}].options[${index}])" class="group rounded-3xl border border-orange-100 bg-white p-5 text-left shadow-sm transition hover:-translate-y-0.5 hover:border-orange-300 hover:shadow-lg">
                <div class="flex items-start gap-4">
                  <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-orange-100 font-black text-orange-600 group-hover:bg-orange-500 group-hover:text-white">${index + 1}</div>
                  <div class="text-lg font-semibold leading-7 text-slate-800">${option.text}</div>
                </div>
              </button>
            `).join('')}
          </div>
        </div>
      `);
    }

    function renderBars(userVector) {
      const labels = ['Social', 'Novelty', 'Emotion', 'Structure'];
      return labels.map((label, index) => `
        <div>
          <div class="mb-2 flex justify-between text-sm font-bold text-slate-700">
            <span>${label}</span>
            <span>${pct(userVector[index])}%</span>
          </div>
          <div class="h-3 overflow-hidden rounded-full bg-slate-100">
            <div class="h-full rounded-full bg-slate-800" style="width: ${pct(userVector[index])}%"></div>
          </div>
        </div>
      `).join('');
    }

    function renderResult() {
      const { winner, runnerUps, userVector } = getResult();

      app.innerHTML = card(`
        <div class="grid gap-8 lg:grid-cols-[1.1fr_0.9fr] lg:items-start">
          <section>
            <p class="mb-3 text-sm font-semibold uppercase tracking-[0.28em] text-orange-500">Your fruit archetype</p>
            <div class="mb-4 text-8xl pop">${winner.emoji}</div>
            <h1 class="mb-4 text-5xl font-black leading-none sm:text-7xl">${winner.name}</h1>
            <div class="mb-6 h-2 w-32 rounded-full bg-gradient-to-r ${winner.color}"></div>
            <p class="mb-8 text-lg leading-8 text-slate-600">${winner.desc}</p>

            <div class="grid gap-4 sm:grid-cols-2">
              <div class="rounded-3xl bg-green-50 p-5">
                <h3 class="mb-3 font-black text-green-800">Strengths</h3>
                <ul class="space-y-2 text-slate-700">
                  ${winner.strengths.map(item => `<li>• ${item}</li>`).join('')}
                </ul>
              </div>
              <div class="rounded-3xl bg-amber-50 p-5">
                <h3 class="mb-3 font-black text-amber-800">Growth</h3>
                <ul class="space-y-2 text-slate-700">
                  ${winner.growth.map(item => `<li>• ${item}</li>`).join('')}
                </ul>
              </div>
            </div>

            <div class="mt-4 rounded-3xl bg-orange-100/70 p-5">
              <h3 class="mb-2 font-black text-orange-800">You thrive</h3>
              <p class="text-slate-700">${winner.thrive}</p>
            </div>
          </section>

          <aside class="rounded-[1.5rem] bg-white p-5 shadow-inner">
            <h2 class="mb-5 text-xl font-black">Your flavor profile</h2>
            <div class="mb-8 grid gap-4">
              ${renderBars(userVector)}
            </div>

            <h2 class="mb-4 text-xl font-black">Closest matches</h2>
            <div class="grid gap-3">
              ${runnerUps.map(fruit => `
                <div class="flex items-center gap-3 rounded-2xl bg-slate-50 p-3">
                  <div class="text-3xl">${fruit.emoji}</div>
                  <div>
                    <div class="font-bold">${fruit.name}</div>
                    <div class="text-sm text-slate-500">Also somewhere in your bowl</div>
                  </div>
                </div>
              `).join('')}
            </div>

            <div class="mt-8 grid gap-3 sm:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2">
              <button id="shareButton" onclick="shareResult()" class="rounded-full bg-slate-900 px-5 py-3 font-bold text-white transition hover:bg-slate-800">Copy result</button>
              <button onclick="restart()" class="rounded-full bg-orange-100 px-5 py-3 font-bold text-slate-800 transition hover:bg-orange-200">Restart</button>
            </div>
          </aside>
        </div>
      `);
    }

    function render() {
      if (state.screen === 'start') renderStart();
      if (state.screen === 'quiz') renderQuiz();
      if (state.screen === 'result') renderResult();
    }

    render();
  </script>
</body>
</html>
